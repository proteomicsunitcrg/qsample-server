# spring.jpa.show-sql=true

server:
    port: 8099

email-conf:
  # Adapt to your final email address and webserver site
  address: roger.olivella@crg.eu
  app-url: "http://localhost:4200"

spring:
    jackson:
        time-zone: UTC
    serialization:
        INDENT_OUTPUT: true
    datasource:
        ## MYSQL
        url: jdbc:mysql://database:3306/qsample?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: "qsample"
        password: "qsample2017"
        driver-class-name: com.mysql.cj.jdbc.Driver
    mail:
      default-encoding: UTF-8
      host: smtp.crg.eu
      port: 25
    h2:
        console:
            enabled: false
    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: MySQL57InnoDB
            format_sql: true
        show-sql: false
    flyway:
      locations:
        - classpath:db/migration
      enabled: true
      baselineOnMigrate: true
      validate-on-migrate: true
      outOfOrder: false
jwt:
    header: Authorization
    secret: ${JWT_SECRET}
    expiration: 604800
    route:
    authentication:
        path: api/auth
        refresh: refresh

qcloud2:
    disable: false
    url: https://api.qcloud2.crg.eu/qsample
    username: qsample
    password: qsample

neon-stats:
    disable: false
    url: http://neon.crg.eu/

nextflow-tower:
    disable: false
    token: xxx
    url: https://api.tower.nf/

agendo:
    username: ${AGENDO_USERNAME:qsample}
    password: ${AGENDO_PASSWORD}
    from: ${AGENDO_FROM:Y3Jn}
    url: ${AGENDO_URL:https://api.qcloud2.crg.eu/mirror?url=https://apieurope.agendoscience.com}
    facility: ${AGENDO_FACILITY:10}

local-requests: false # This environment must always use Agendo; local requests are only for external/lab-specific local setups.

cors:
    # Comma-separated origins allowed for cross-origin requests (no trailing slash).
    # Override via the QSAMPLE_CORS_ORIGINS env var, like QSAMPLE_API_PREFIX.
    # Dev default also admits the standalone client dev server (see email-conf.app-url).
    allowed-origins: ${QSAMPLE_CORS_ORIGINS:http://localhost:8099,http://localhost:4200}

---

spring:
  profiles: prod
logging:
  file: /tmp/qsample.log
  level:
    org.springframework:
    security: ERROR


spring.main.allow-bean-definition-overriding: true
